<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a30"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <g transform="translate(512, 512)">
    <!-- Stange -->
    <rect x="-180" y="-30" width="360" height="60" rx="10" fill="url(#accentGrad)"/>

    <!-- Linkes Gewicht aussen -->
    <rect x="-320" y="-210" width="80" height="420" rx="22" fill="url(#accentGrad)"/>
    <!-- Linkes Gewicht innen -->
    <rect x="-230" y="-170" width="50" height="340" rx="16" fill="url(#accentGrad)"/>

    <!-- Rechtes Gewicht innen -->
    <rect x="180" y="-170" width="50" height="340" rx="16" fill="url(#accentGrad)"/>
    <!-- Rechtes Gewicht aussen -->
    <rect x="240" y="-210" width="80" height="420" rx="22" fill="url(#accentGrad)"/>
  </g>
</svg>
